name: CI — Second Brain

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check src/ config/ main.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}" }
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov
      - name: Run unit tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
      - name: Check config imports
        run: python -c "import sys; sys.path.insert(0,'.'); from config.settings import *; print('Config OK')"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t second-brain:ci .
      - name: Verify Docker image
        run: docker run --rm second-brain:ci --help
